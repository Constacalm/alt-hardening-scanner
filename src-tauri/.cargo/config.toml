# Конфигурация cargo для ALT Linux
#
# Проблема: системный rust из репозитория ALT Linux собран под triplet
# x86_64-alt-linux и ожидает линкер /usr/bin/x86_64-alt-linux-gcc.
# Этот файл явно указывает cargo использовать /usr/bin/gcc,
# который всегда доступен при установленном пакете gcc.

[target.x86_64-alt-linux]
linker = "/usr/bin/gcc"

[target.x86_64-unknown-linux-gnu]
linker = "/usr/bin/gcc"
